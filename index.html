<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B2B Enterprise Platform</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* ===== HERO ===== */
.hero {
  height:320px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(120deg,#1e293b,#0f172a);
  text-align:center;
  flex-direction:column;
}

.hero h1 {
  font-size:40px;
}

.btn {
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

/* ===== SLIDER ===== */
.slider {
  width:100%;
  height:280px;
  overflow:hidden;
}

.slides {
  display:flex;
  width:300%;
  animation:slide 10s infinite;
}

.slides img {
  width:100%;
  height:280px;
  object-fit:cover;
}

@keyframes slide {
  0%{transform:translateX(0);}
  33%{transform:translateX(-100%);}
  66%{transform:translateX(-200%);}
  100%{transform:translateX(0);}
}

/* ===== PRODUCTS ===== */
.section {
  padding:40px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

.card img {
  width:100%;
  border-radius:10px;
}

/* ===== VIDEO ===== */
.video {
  text-align:center;
  padding:40px;
}

iframe {
  width:80%;
  height:400px;
  border-radius:10px;
}

/* ===== CONTACT ===== */
.contact {
  background:#111827;
  padding:40px;
  text-align:center;
}

.contact a {
  color:#22c55e;
  display:block;
  margin:5px;
}
</style>

</head>

<body>

<!-- ================= HERO ================= -->
<div class="hero">
  <h1>B2B Global Supply Platform</h1>
  <p>Fast • Reliable • Factory Direct</p>
  <button class="btn" onclick="window.open('https://wa.me/123456789')">
    Get Quote
  </button>
</div>

<!-- ================= SLIDER ================= -->
<div class="slider">
  <div class="slides">
    <img src="https://picsum.photos/id/1015/1200/400">
    <img src="https://picsum.photos/id/1016/1200/400">
    <img src="https://picsum.photos/id/1018/1200/400">
  </div>
</div>

<!-- ================= PRODUCTS ================= -->
<div class="section">
  <h2>Our Products</h2>
  <div id="products" class="grid"></div>
</div>

<!-- ================= VIDEO ================= -->
<div class="video">
  <h2>Company Introduction</h2>
  <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>

<!-- ================= CONTACT ================= -->
<div class="contact">
  <h2>Contact Us</h2>
  <a href="https://wa.me/qr/XBVZACVXGQOJL1">WhatsApphttps://wa.me/qr/XBVZACVXGQOJL1</a>
  <a href="mailto:info@thomas.bbroot.com">Email: info@thomas.bbroot.com</a>
</div>

<script>
async function loadProducts() {
  const res = await fetch("
tb2b-9di.pages.dev");
  const data = await res.json();

  document.getElementById("products").innerHTML = data.map(p => `
    <div class="card">
      <img src="${p.image}" />
      <h3>${p.name}</h3>
      <p>${p.description}</p>
      <b>${p.price}</b>
    </div>
  `).join("");
}

loadProducts();
</script>

</body>
</html>
