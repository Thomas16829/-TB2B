<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>

<body>

<h1>Product Admin</h1>

<input id="name" placeholder="Name">
<input id="desc" placeholder="Desc">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image">
<input id="cat" placeholder="Category">

<button onclick="add()">Add</button>

<div id="list"></div>

<script>

const API = "https://your-worker.workers.dev/api/products";

// 获取
async function load(){
  const res = await fetch(API);
  const data = await res.json();

  document.getElementById("list").innerHTML = data.map(p => `
    <div>
      <b>${p.name}</b>
      <button onclick="del(${p.id})">Delete</button>
    </div>
  `).join("");
}

// 添加
async function add(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:name.value,
      description:desc.value,
      price:price.value,
      image:image.value,
      category:cat.value
    })
  });

  load();
}

// 删除
async function del(id){
  await fetch(`${API}/${id}`,{method:"DELETE"});
  load();
}

load();

</script>

</body>
</html>
